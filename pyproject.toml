[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[[tool.poetry.source]]
name = "xpu"
url = "https://download.pytorch.org/whl/xpu"
priority = "supplemental"

[[tool.poetry.source]]
name = "PyPI"
