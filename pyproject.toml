[project]
name = "agentic-nlp-pipeline"
version = "0.1.0"
description = ""
authors = [
    {name = "Your Name",email = "you@example.com"},
    {name = "Your Name",email = "you@example.com"},
    {name = "Your Name",email = "you@example.com"},
    {name = "Jan Raring",email = "janraring@yahoo.de"}
]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "ipython",
    "isort",
    "jupyterlab",
    "matplotlib",
    "notebook",
    "numpy",
    "pandas",
    "pip",
    "pytest",
    "python-dotenv",
    "scikit-learn",
    "stanza (>=1.11.1,<2.0.0)",
    "torch (==2.7.1+xpu)",
    "torchvision (==0.22.1+xpu)",
    "torchaudio (==2.7.1+xpu)",
